<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pizzaria Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box; /* Essencial para não ficar torto */
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

            input:focus {
                border-color: #e73c7e;
            }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            background: #28a745;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

            button:hover {
                background: #218838;
                transform: translateY(-2px);
            }

            button:active {
                transform: translateY(0);
            }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🍕 Pizzaria Login</h2>

        <div class="input-group">
            <input id="login" type="text" placeholder="Usuário">
        </div>

        <div class="input-group">
            <input id="senha" type="password" placeholder="Senha">
        </div>

        <button onclick="entrar()">Acessar Sistema</button>
    </div>

    <script>
        function entrar() {
            const loginInput = document.getElementById("login").value;
            const senhaInput = document.getElementById("senha").value;

            if (!loginInput || !senhaInput) {
                alert("Preencha todos os campos, Jão!");
                return;
            }

            let dto = {
                login: loginInput,
                senha: senhaInput
            };

            fetch("https://localhost:7108/api/Usuario/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dto)
            })
                .then(r => {
                    if (!r.ok) throw new Error("Não autorizado");
                    return r.json();
                })
                .then(user => {
                    // Tratando possíveis variações de maiúsculas/minúsculas vindas da API
                    localStorage.setItem("usuarioId", user.id || user.Id);
                    localStorage.setItem("perfil", user.perfil || user.Perfil || "usuario");

                    window.location = "cardapio.html";
                })
                .catch(err => {
                    console.error(err);
                    alert("Erro ao entrar. Verifique se o servidor SQL e a API estão rodando!");
                });
        }
    </script>
</body>
</html>
