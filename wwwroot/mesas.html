<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Mesas - Pizzaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        #container-mesas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card-mesa {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-top: 10px solid #ccc;
        }

        .verde {
            border-top-color: #28a745;
        }

        .vermelha {
            border-top-color: #dc3545;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

            button:hover {
                background: black;
            }
    </style>
</head>

<body>

    <h2>📊 Monitoramento de Mesas</h2>

    <div id="container-mesas">Carregando...</div>

    <script>

        function carregarStatusMesas() {

            fetch("https://localhost:7108/api/Mesa")
                .then(r => r.json())
                .then(mesas => {

                    let html = "";

                    mesas.forEach(m => {

                        const isLivre = m.status === "Livre";

                        html += `
                        <div class="card-mesa ${isLivre ? 'verde' : 'vermelha'}">
                            <h3>Mesa ${m.numero}</h3>
                            <p>Status: ${m.status}</p>
                            ${!isLivre ? `<button onclick="finalizarMesa(${m.id})">Fechar Mesa</button>` : ''}
                        </div>
                    `;
                    });

                    document.getElementById("container-mesas").innerHTML = html;
                });
        }

        function finalizarMesa(mesaId) {

            if (!confirm("Deseja fechar essa mesa?")) return;

            fetch(`https://localhost:7108/api/Pedido/fechar-mesa?mesaId=${mesaId}`, {
                method: "POST"
            })
                .then(r => {
                    if (r.ok) {
                        alert("Mesa fechada!");
                        carregarStatusMesas();
                    } else {
                        alert("Erro ao fechar mesa");
                    }
                });
        }

        carregarStatusMesas();
        setInterval(carregarStatusMesas, 5000);

    </script>

</body>
</html>
